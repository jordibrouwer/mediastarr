name: Bug Report / Fehlermeldung
description: Report a bug / Melde einen Fehler
title: "[Bug]: "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        ## 🇬🇧 English / 🇩🇪 Deutsch
        Please fill out the form below. / Bitte fülle das Formular aus.

  - type: textarea
    id: description
    attributes:
      label: Bug Description / Fehlerbeschreibung
      placeholder: |
        EN: What happened? What did you expect?
        DE: Was ist passiert? Was hättest du erwartet?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce / Schritte zur Reproduktion
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mediastarr Version
      placeholder: "e.g. v6.4.1"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation
      options:
        - Docker (docker run)
        - Docker Compose
        - Unraid Community Apps
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Fehlerausgabe
      placeholder: |
        EN: Paste relevant log output here (docker logs mediastarr)
        DE: Relevante Log-Ausgabe hier einfügen (docker logs mediastarr)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context / Weitere Informationen
      placeholder: Screenshots, config details, etc.
