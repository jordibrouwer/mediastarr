apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mediastarr-data
  namespace: mediastarr
  labels:
    app.kubernetes.io/name: mediastarr
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Uncomment and set your StorageClass if needed:
  # storageClassName: longhorn
  # storageClassName: nfs-client
  # storageClassName: local-path
