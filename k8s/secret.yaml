apiVersion: v1
kind: Secret
metadata:
  name: mediastarr-secret
  namespace: mediastarr
  labels:
    app.kubernetes.io/name: mediastarr
type: Opaque
stringData:
  # MEDIASTARR_PASSWORD: your-secure-password-here
  # Remove the comment above and set a password before applying.
  # Apply with:  kubectl apply -f secret.yaml
  # After applying, delete this file or store it in a secrets manager.
  # To generate a strong password:
  #   openssl rand -base64 32
