apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediastarr
  namespace: mediastarr
  labels:
    app.kubernetes.io/name: mediastarr
  annotations:
    # nginx ingress controller (most common):
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # TLS via cert-manager (uncomment if using):
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Traefik (comment out nginx annotations and uncomment these):
    # kubernetes.io/ingress.class: "traefik"
spec:
  # TLS (uncomment and set your hostname):
  # tls:
  #   - hosts:
  #       - mediastarr.example.com
  #     secretName: mediastarr-tls
  rules:
    - host: mediastarr.example.com   # replace with your hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mediastarr
                port:
                  name: http
